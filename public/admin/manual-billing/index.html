<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin</title>

<style>
body {
  font-family: -apple-system;
  background: #f5f5f7;
  padding: 20px;
}

.card {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 20px;
}

input {
  width: 100%;
  height: 50px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 10px;
}

button {
  height: 50px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #0071e3;
  color: white;
}

.plan {
  width: 48%;
  margin-bottom: 10px;
}

.row {
  display: flex;
  gap: 10px;
}

pre {
  background: #f2f2f2;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Manual Billing Admin</h2>

<input id="key" placeholder="Admin Key">
<input id="email" placeholder="User Email">
<input id="mp" placeholder="Add MP">

<div class="row">
<button onclick="lookup()">회원 조회</button>
<button class="primary" onclick="apply()">MP 지급</button>
</div>

<h3>플랜 변경</h3>

<div class="row">
<button class="plan" onclick="plan('basic')">Basic</button>
<button class="plan" onclick="plan('standard')">Standard</button>
</div>

<div class="row">
<button class="plan" onclick="plan('premium')">Premium</button>
<button class="plan" onclick="plan('elite')">Elite</button>
</div>

<pre id="out"></pre>

</div>

<script>

async function request(body){
  const res = await fetch('/api/admin/manual-credit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  return await res.json();
}

async function lookup(){
  const data = await fetch('/api/admin/member-lookup',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      email: email.value,
      adminKey: key.value
    })
  }).then(r=>r.json());

  out.innerText = JSON.stringify(data,null,2);
}

async function apply(){
  if(!confirm('MP 지급하시겠습니까?')) return;

  const data = await request({
    email: email.value,
    addMp: Number(mp.value),
    adminKey: key.value
  });

  out.innerText = JSON.stringify(data,null,2);
}

async function plan(type){
  if(!confirm(type + ' 플랜 적용할까요?')) return;

  const data = await request({
    email: email.value,
    setPlan: type,
    adminKey: key.value
  });

  out.innerText = JSON.stringify(data,null,2);
}

</script>

</body>
</html>
