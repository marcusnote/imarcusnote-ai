<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual Billing Admin</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: rgba(255,255,255,0.82);
      --line: rgba(0,0,0,0.08);
      --text: #111111;
      --sub: #6e6e73;
      --blue: #0071e3;
      --blue-hover: #0077ed;
      --green: #16a34a;
      --shadow: 0 18px 40px rgba(0,0,0,0.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #f7f7f8 0%, #f2f2f4 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 18px;
      padding: 8px 2px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .sub {
      margin-top: 10px;
      font-size: 17px;
      line-height: 1.6;
      color: var(--sub);
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      min-height: 56px;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.10);
      background: rgba(255,255,255,0.92);
      padding: 0 16px;
      font-size: 18px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    .input:focus {
      border-color: rgba(0,113,227,0.45);
      box-shadow: 0 0 0 4px rgba(0,113,227,0.12);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      min-height: 54px;
      border-radius: 16px;
      border: none;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--blue);
      color: white;
    }

    .btn-primary:hover { background: var(--blue-hover); }

    .btn-secondary {
      background: #ffffff;
      color: var(--text);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .status {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      background: rgba(0,0,0,0.03);
      color: var(--sub);
      display: none;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .status.show { display: block; }

    .status.ok {
      background: rgba(22,163,74,0.10);
      color: #166534;
      border: 1px solid rgba(22,163,74,0.20);
    }

    .status.err {
      background: rgba(220,38,38,0.08);
      color: #991b1b;
      border: 1px solid rgba(220,38,38,0.16);
    }

    .result {
      margin-top: 18px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.07);
      padding: 16px;
      min-height: 180px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 13px;
      line-height: 1.6;
      color: #1d1d1f;
    }

    @media (max-width: 640px) {
      h1 { font-size: 32px; }
      .actions { grid-template-columns: 1fr; }
      .input { min-height: 58px; font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">Marcusnote Admin</div>
      <h1>Manual Billing Admin</h1>
      <div class="sub">입금 확인 후 회원 조회와 MP 수동 지급을 간단하게 처리하는 관리자 화면입니다.</div>
    </div>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="adminKey">Admin Key</label>
          <input id="adminKey" class="input" type="password" placeholder="관리자 승인 키를 입력하세요" />
        </div>

        <div class="field">
          <label for="email">User Email</label>
          <input id="email" class="input" type="email" placeholder="회원 이메일을 입력하세요" />
        </div>

        <div class="field">
          <label for="mp">Add MP</label>
          <input id="mp" class="input" type="number" min="0" step="1" placeholder="추가할 MP를 입력하세요" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-secondary" onclick="lookup()">회원 조회</button>
        <button class="btn-primary" onclick="apply()">MP 지급</button>
      </div>

      <div id="status" class="status"></div>
      <div id="result" class="result">여기에 조회 결과가 표시됩니다.</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function setStatus(message, type = '') {
      const el = $('status');
      el.className = 'status show' + (type ? ' ' + type : '');
      el.textContent = message;
    }

    function setResult(data) {
      $('result').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    async function requestJson(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        data = { ok: false, rawText: text };
      }

      return { res, data };
    }

    async function lookup() {
      const adminKey = $('adminKey').value.trim();
      const email = $('email').value.trim();

      if (!adminKey || !email) {
        setStatus('Admin Key와 User Email을 먼저 입력하세요.', 'err');
        return;
      }

      setStatus('회원 정보를 조회하고 있습니다...');
      setResult('조회 중...');

      try {
        const { res, data } = await requestJson('/api/admin/member-lookup', { adminKey, email });

        if (!res.ok || !data.ok) {
          setStatus(data.error || '회원 조회에 실패했습니다.', 'err');
          setResult(data);
          return;
        }

        setStatus('회원 조회가 완료되었습니다.', 'ok');
        setResult(data);
      } catch (err) {
        setStatus('회원 조회 중 오류가 발생했습니다.', 'err');
        setResult(String(err));
      }
    }

    async function apply() {
      const adminKey = $('adminKey').value.trim();
      const email = $('email').value.trim();
      const addMp = $('mp').value.trim();

      if (!adminKey || !email) {
        setStatus('Admin Key와 User Email을 먼저 입력하세요.', 'err');
        return;
      }

      if (addMp === '' || Number(addMp) < 0) {
        setStatus('추가할 MP를 올바르게 입력하세요.', 'err');
        return;
      }

      setStatus('MP를 지급하고 있습니다...');
      setResult('지급 중...');

      try {
        const { res, data } = await requestJson('/api/admin/manual-credit', {
          adminKey,
          email,
          addMp: Number(addMp)
        });

        if (!res.ok || !data.ok) {
          setStatus(data.error || 'MP 지급에 실패했습니다.', 'err');
          setResult(data);
          return;
        }

        setStatus('MP 지급이 완료되었습니다.', 'ok');
        setResult(data);
      } catch (err) {
        setStatus('MP 지급 중 오류가 발생했습니다.', 'err');
        setResult(String(err));
      }
    }
  </script>
</body>
</html>
